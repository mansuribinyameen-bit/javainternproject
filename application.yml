spring:
  datasource:
    url: jdbc:mysql://localhost:3306/online_bookstore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false
  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: 8080

app:
  security:
    default-role: CUSTOMER

