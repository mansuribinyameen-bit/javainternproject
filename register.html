<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div class="container">
    <h2>Create account</h2>

    <form th:action="@{/register}" th:object="${request}" method="post">
        <div>
            <label>Email</label>
            <input type="email" th:field="*{email}" />
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div>
            <label>Full name</label>
            <input type="text" th:field="*{fullName}" />
            <div class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
        </div>

        <div>
            <label>Password</label>
            <input type="password" th:field="*{password}" />
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit">Register</button>
    </form>

    <p><a th:href="@{/login}">Back to login</a></p>
</div>
</body>
</html>
